<div class="login-page">
  <div class="login-card">

    <div class="login-header">
      <div class="login-icon-wrapper">
        <ion-icon name="card-outline" class="login-icon"></ion-icon>
      </div>
      <h1 class="login-title">Credit Manager</h1>
      <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">

      <div class="field-group">
        <label class="field-label">Usuario</label>
        <input
          formControlName="username"
          type="text"
          placeholder="admin"
          class="field-input" />
        <p class="field-error"
           *ngIf="form.get('username')?.touched && form.get('username')?.invalid">
          El usuario es requerido
        </p>
      </div>

      <div class="field-group">
        <label class="field-label">Contraseña</label>
        <input
          formControlName="password"
          type="password"
          placeholder="••••••••"
          class="field-input" />
        <p class="field-error"
           *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          La contraseña es requerida
        </p>
      </div>

      <app-error-alert *ngIf="errorMessage" [message]="errorMessage"></app-error-alert>

      <button
        type="submit"
        [disabled]="loading"
        class="submit-btn">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">Iniciar sesión</span>
      </button>

    </form>
  </div>
</div>
