<div class="form-page">
  <div class="form-card">

    <div class="form-header">
      <button
        (click)="goBack()"
        class="back-btn">
        <ion-icon name="arrow-back-outline" class="back-icon"></ion-icon>
      </button>
      <h2 class="form-title">Nueva solicitud de crédito</h2>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-body">

      <div class="field-group">
        <label class="field-label">Monto solicitado (USD)</label>
        <input
          formControlName="amount"
          type="number"
          placeholder="500 – 50,000"
          class="field-input"
          [ngClass]="hasError('amount','required')||hasError('amount','min')||hasError('amount','max') ? 'invalid' : ''" />
        <p class="field-error" *ngIf="hasError('amount','required')">El monto es requerido</p>
        <p class="field-error" *ngIf="hasError('amount','min')">El monto mínimo es $500</p>
        <p class="field-error" *ngIf="hasError('amount','max')">El monto máximo es $50,000</p>
      </div>

      <div class="field-group">
        <label class="field-label">Plazo (meses)</label>
        <input
          formControlName="termMonths"
          type="number"
          placeholder="6 – 60"
          class="field-input"
          [ngClass]="hasError('termMonths','required')||hasError('termMonths','min')||hasError('termMonths','max') ? 'invalid' : ''" />
        <p class="field-error" *ngIf="hasError('termMonths','required')">El plazo es requerido</p>
        <p class="field-error" *ngIf="hasError('termMonths','min')">Mínimo 6 meses</p>
        <p class="field-error" *ngIf="hasError('termMonths','max')">Máximo 60 meses</p>
      </div>

      <div class="field-group">
        <label class="field-label">ID del solicitante</label>
        <input
          formControlName="applicantId"
          type="text"
          placeholder="Identificación del solicitante"
          class="field-input"
          [ngClass]="hasError('applicantId','required')||hasError('applicantId','minlength') ? 'invalid' : ''" />
        <p class="field-error" *ngIf="hasError('applicantId','required')">El ID es requerido</p>
        <p class="field-error" *ngIf="hasError('applicantId','minlength')">Mínimo 5 caracteres</p>
      </div>

      <div *ngIf="errorMessage" class="error-alert">
        <ion-icon name="alert-circle-outline" class="error-alert-icon"></ion-icon>
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="submit-btn">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">Crear solicitud</span>
      </button>

    </form>
  </div>
</div>
