<div class="list-container">
  <div class="list-header">
    <h2>Solicitudes de crédito</h2>
    <div class="filter-row">
      <ion-select
        [(ngModel)]="selectedStatus"
        (ionChange)="onFilterChange()"
        placeholder="Filtrar por estado"
        class="status-filter">
        <ion-select-option *ngFor="let opt of statusOptions" [value]="opt.value">
          {{ opt.label }}
        </ion-select-option>
      </ion-select>
    </div>
  </div>

  <div class="loading-spinner" *ngIf="loading">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
  </div>

  <div class="empty-state" *ngIf="!loading && requests.length === 0">
    <ion-icon name="document-outline"></ion-icon>
    <p>No hay solicitudes para mostrar</p>
  </div>

  <div class="requests-grid" *ngIf="!loading && requests.length > 0">
    <ion-card
      *ngFor="let req of requests"
      class="request-card"
      (click)="goToDetail(req.id)">
      <ion-card-header>
        <div class="card-top">
          <ion-card-subtitle>ID #{{ req.id }}</ion-card-subtitle>
          <ion-badge [color]="statusColor(req.status)">
            {{ statusLabel(req.status) }}
          </ion-badge>
        </div>
        <ion-card-title>{{ req.amount | currency:'USD':'symbol':'1.0-0' }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <div class="card-detail">
          <ion-icon name="person-outline"></ion-icon>
          <span>{{ req.applicantId }}</span>
        </div>
        <div class="card-detail">
          <ion-icon name="calendar-outline"></ion-icon>
          <span>{{ req.termMonths }} meses</span>
        </div>
        <div class="card-detail">
          <ion-icon name="time-outline"></ion-icon>
          <span>{{ req.createdAt | date:'dd/MM/yyyy' }}</span>
        </div>
      </ion-card-content>
    </ion-card>
  </div>

  <div class="pagination" *ngIf="totalPages > 1">
    <ion-button fill="outline" size="small" (click)="prevPage()" [disabled]="page === 0">
      <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
    </ion-button>
    <span>{{ page + 1 }} / {{ totalPages }}</span>
    <ion-button fill="outline" size="small" (click)="nextPage()" [disabled]="page >= totalPages - 1">
      <ion-icon slot="icon-only" name="chevron-forward-outline"></ion-icon>
    </ion-button>
  </div>
</div>
