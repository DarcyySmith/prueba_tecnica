<div class="list-page">

  <div class="list-header">
    <h2 class="list-title">Solicitudes de crédito</h2>
    <select
      [(ngModel)]="selectedStatus"
      (ngModelChange)="onFilterChange()"
      class="status-filter">
      <option *ngFor="let opt of statusOptions" [value]="opt.value">{{ opt.label }}</option>
    </select>
  </div>

  <div *ngIf="loading" class="loading-state">
    <ion-spinner name="crescent" class="loading-spinner"></ion-spinner>
  </div>

  <div *ngIf="!loading && requests.length === 0"
       class="empty-state">
    <ion-icon name="document-outline" class="empty-icon"></ion-icon>
    <p class="empty-text">No hay solicitudes para mostrar</p>
  </div>

  <div *ngIf="!loading && requests.length > 0"
       class="requests-grid">
    <div
      *ngFor="let req of requests"
      (click)="goToDetail(req.id)"
      class="request-card">

      <div class="request-card-header">
        <span class="request-id">#{{ req.id }}</span>
        <span class="request-status"
          [ngClass]="{
            'pending': req.status === 'PENDING',
            'approved': req.status === 'APPROVED',
            'rejected': req.status === 'REJECTED'
          }">
          {{ statusLabel(req.status) }}
        </span>
      </div>

      <p class="request-amount">
        {{ req.amount | currency:'USD':'symbol':'1.0-0' }}
      </p>

      <div class="request-meta">
        <div class="meta-row">
          <ion-icon name="person-outline"></ion-icon>
          <span>{{ req.applicantId }}</span>
        </div>
        <div class="meta-row">
          <ion-icon name="calendar-outline"></ion-icon>
          <span>{{ req.termMonths }} meses</span>
        </div>
        <div class="meta-row">
          <ion-icon name="time-outline"></ion-icon>
          <span>{{ req.createdAt | date:'dd/MM/yyyy' }}</span>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="totalPages > 1"
       class="pagination">
    <button
      (click)="prevPage()"
      [disabled]="page === 0"
      class="page-btn">
      <ion-icon name="chevron-back-outline" class="page-icon"></ion-icon>
    </button>
    <span class="page-info">{{ page + 1 }} / {{ totalPages }}</span>
    <button
      (click)="nextPage()"
      [disabled]="page >= totalPages - 1"
      class="page-btn">
      <ion-icon name="chevron-forward-outline" class="page-icon"></ion-icon>
    </button>
  </div>

</div>
