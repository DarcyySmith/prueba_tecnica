<div class="max-w-5xl mx-auto px-4 py-8">

  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <h2 class="text-2xl font-bold text-blue-950">Solicitudes de crédito</h2>
    <select
      [(ngModel)]="selectedStatus"
      (ngModelChange)="onFilterChange()"
      class="px-4 py-2 rounded-lg border border-gray-200 bg-white text-sm text-gray-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <option *ngFor="let opt of statusOptions" [value]="opt.value">{{ opt.label }}</option>
    </select>
  </div>

  <div *ngIf="loading" class="flex justify-center py-20">
    <ion-spinner name="crescent" class="text-blue-600 w-10 h-10"></ion-spinner>
  </div>

  <div *ngIf="!loading && requests.length === 0"
       class="flex flex-col items-center py-20 text-gray-400">
    <ion-icon name="document-outline" class="text-6xl mb-3"></ion-icon>
    <p class="text-base">No hay solicitudes para mostrar</p>
  </div>

  <div *ngIf="!loading && requests.length > 0"
       class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
    <div
      *ngFor="let req of requests"
      (click)="goToDetail(req.id)"
      class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 cursor-pointer hover:-translate-y-1 hover:shadow-md transition-all duration-200">

      <div class="flex items-center justify-between mb-3">
        <span class="text-xs font-medium text-gray-400">#{{ req.id }}</span>
        <span class="text-xs font-semibold px-2 py-1 rounded-full"
          [ngClass]="{
            'bg-yellow-100 text-yellow-700': req.status === 'PENDING',
            'bg-green-100 text-green-700':  req.status === 'APPROVED',
            'bg-red-100 text-red-700':      req.status === 'REJECTED'
          }">
          {{ statusLabel(req.status) }}
        </span>
      </div>

      <p class="text-2xl font-bold text-blue-700 mb-3">
        {{ req.amount | currency:'USD':'symbol':'1.0-0' }}
      </p>

      <div class="space-y-1 text-sm text-gray-500">
        <div class="flex items-center gap-2">
          <ion-icon name="person-outline"></ion-icon>
          <span>{{ req.applicantId }}</span>
        </div>
        <div class="flex items-center gap-2">
          <ion-icon name="calendar-outline"></ion-icon>
          <span>{{ req.termMonths }} meses</span>
        </div>
        <div class="flex items-center gap-2">
          <ion-icon name="time-outline"></ion-icon>
          <span>{{ req.createdAt | date:'dd/MM/yyyy' }}</span>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="totalPages > 1"
       class="flex items-center justify-center gap-4 mt-8">
    <button
      (click)="prevPage()"
      [disabled]="page === 0"
      class="p-2 rounded-lg border border-gray-200 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">
      <ion-icon name="chevron-back-outline" class="text-gray-600"></ion-icon>
    </button>
    <span class="text-sm text-gray-500">{{ page + 1 }} / {{ totalPages }}</span>
    <button
      (click)="nextPage()"
      [disabled]="page >= totalPages - 1"
      class="p-2 rounded-lg border border-gray-200 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">
      <ion-icon name="chevron-forward-outline" class="text-gray-600"></ion-icon>
    </button>
  </div>

</div>
