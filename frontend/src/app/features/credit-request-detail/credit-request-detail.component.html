<div class="detail-page">

  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <div *ngIf="!loading && request" class="detail-card">

    <div class="detail-header">
      <button
        (click)="goBack()"
        class="back-btn">
        <ion-icon name="arrow-back-outline" class="back-icon"></ion-icon>
      </button>
      <h2 class="detail-title">Solicitud #{{ request.id }}</h2>
      <app-status-badge [status]="request.status" [label]="statusLabel(request.status)"></app-status-badge>
    </div>

    <app-detail-grid [items]="detailItems"></app-detail-grid>

    <div *ngIf="request.status === 'PENDING'"
         class="actions-section">
      <h3 class="actions-title">Actualizar estado</h3>

      <form [formGroup]="commentForm" class="comment-form">
        <label class="field-label">
          Comentario <span class="label-note">(requerido para rechazar)</span>
        </label>
        <textarea
          formControlName="comment"
          rows="3"
          placeholder="Agrega un comentario..."
          class="comment-textarea">
        </textarea>
      </form>

      <app-error-alert *ngIf="errorMessage" [message]="errorMessage"></app-error-alert>

      <app-request-actions
        [disabled]="updating"
        [loading]="updating"
        (approve)="approve()"
        (reject)="reject()">
      </app-request-actions>
    </div>

  </div>
</div>
