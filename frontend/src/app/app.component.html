<div class="min-h-screen bg-gray-50 flex flex-col">

  <nav *ngIf="authService.isAuthenticated()"
       class="bg-blue-900 text-white shadow-lg">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <ion-icon name="card-outline" class="text-2xl text-blue-300"></ion-icon>
        <span class="text-lg font-bold tracking-tight">Credit Manager</span>
      </div>
      <div class="flex items-center gap-2">
        <a routerLink="/requests/new"
           class="flex items-center gap-1 bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-semibold transition">
          <ion-icon name="add-outline" class="text-base"></ion-icon>
          Nueva solicitud
        </a>
        <button
          (click)="logout()"
          class="flex items-center gap-1 hover:bg-blue-800 px-3 py-2 rounded-lg text-sm transition text-blue-200">
          <ion-icon name="log-out-outline" class="text-base"></ion-icon>
          Salir
        </button>
      </div>
    </div>
  </nav>

  <main class="flex-1">
    <router-outlet />
  </main>

</div>
