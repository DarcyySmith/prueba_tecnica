<div class="app-shell">

  <nav *ngIf="authService.isAuthenticated()" class="app-navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <ion-icon name="card-outline" class="brand-icon"></ion-icon>
        <span class="brand-text">Credit Manager</span>
      </div>
      <div class="navbar-actions">
        <a routerLink="/requests/new" class="nav-btn-primary">
          <ion-icon name="add-outline" class="nav-icon"></ion-icon>
          Nueva solicitud
        </a>
        <button (click)="logout()" class="nav-btn-text">
          <ion-icon name="log-out-outline" class="nav-icon"></ion-icon>
          Salir
        </button>
      </div>
    </div>
  </nav>

  <main class="app-main">
    <router-outlet />
  </main>

</div>
